version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend
